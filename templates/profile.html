<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ensures body fills at least the viewport height */
            background-color: #f8f9fa; /* Light mode background */
            color: #212529;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark-mode {
            background-color: #121212; /* Dark mode background */
            color: #e0e0e0;
        }

        .dark-mode .navbar {
            background-color: #1f1f1f;
        }

        .profile-container {
            flex-grow: 1; /* Ensures it expands to fill available space */
            background: inherit; /* Matches body background */
        }

        .profile-content {
            background: white; /* Card-like styling */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 1rem;
        }

        .dark-mode .profile-content {
            background: #333; /* Matches dark mode background */
            color: #e0e0e0;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.1);
        }

        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem 0;
        }

        .dark-mode .footer {
            background-color: #1f1f1f;
        }

        .small-input {
            width: 30%; /* Adjust the width to your preference */
        }
    </style>
    <script>
        // Function to toggle dark mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');

            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('darkMode', 'enabled');
            } else {
                localStorage.setItem('darkMode', 'disabled');
            }
        }

        // Function to fetch profile data
        async function fetchProfileData() {
            try {
                const response = await fetch("/get_profile");
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        document.querySelector(".profile-header h1").textContent = data.data.username;
                        document.querySelector(".profile-header p").textContent = data.data.email;
                        document.getElementById("name").value = data.data.username; // Pre-fill edit form
                    } else {
                        alert(data.error || "An error occurred while fetching the profile data.");
                    }
                } else {
                    const errorText = await response.text();
                    alert(`Error: ${errorText}`);
                }
            } catch (error) {
                console.error("Error fetching profile data:", error);
                alert("An error occurred while fetching the profile data.");
            }
        }

        // Function to handle form submission
        async function handleFormSubmit(event) {
            event.preventDefault(); // Prevent default form submission

            const name = document.getElementById("name").value;

            try {
                const response = await fetch("/update_profile", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ name }),
                    credentials: "same-origin"
                });

                if (response.ok) {
                    alert("Profile updated successfully!");
                    fetchProfileData(); // Refresh profile data
                } else {
                    const errorText = await response.text();
                    alert(`Error: ${errorText}`);
                }
            } catch (error) {
                console.error("Error during profile update:", error);
                alert("An error occurred. Please try again.");
            }
        }

        // Fetch profile data on page load
        window.onload = function () {
            if (localStorage.getItem("darkMode") === "enabled") {
                document.body.classList.add("dark-mode");
            }
            fetchProfileData(); // Fetch profile data
        };
    </script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <a class="navbar-brand" href="#">DocSummarizer</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <button class="btn btn-link nav-link" id="darkModeButton" onclick="toggleDarkMode()">Dark Mode</button>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/fe">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/profile">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link btn btn-danger text-white" href="/logout" onclick="window.location.href='/login'; return false;">Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Profile Section -->
    <div class="profile-container mt-5">
        <div class="profile-content mx-auto">
            <div class="profile-header text-center py-4">
                <h1>Loading...</h1> <!-- Placeholder until data is loaded -->
                <p>Loading...</p> <!-- Placeholder until data is loaded -->
            </div>

            <div class="edit-profile">
                <h2>Edit Profile</h2>
                <form id="editProfileForm" onsubmit="handleFormSubmit(event)">
                    <div class="form-group">
                        <label for="name">Full Name:</label>
                        <input type="text" id="name" name="name" class="form-control small-input" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

   <!-- Footer -->
<footer class="footer text-center">
    <p>Sijan Tandukar &copy; Document Summarizer.</p>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.6/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
